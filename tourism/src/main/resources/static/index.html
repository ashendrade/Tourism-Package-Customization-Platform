<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelEase | Tourism Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">TravelEase</div>
        <ul>
            <li><a href="#" onclick="showSection('packages')">Explore Packages</a></li>
            <li><a href="#" onclick="showSection('bookings')">My Bookings</a></li>
        </ul>
    </nav>

    <main id="content">
        <!-- Packages Section -->
        <section id="packages-section">
            <h1>Discover Your Next Adventure</h1>
            <div id="package-list" class="grid-container">
                <!-- Packages will be loaded here -->
            </div>
        </section>

        <!-- Bookings Section -->
        <section id="bookings-section" style="display: none;">
            <h1>Your Bookings</h1>
            <div id="booking-list" class="list-container">
                <!-- Bookings will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Confirm Your Booking</h2>
            <div id="modal-details"></div>
            <button id="confirm-booking-btn" class="btn-primary">Confirm & Pay</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
